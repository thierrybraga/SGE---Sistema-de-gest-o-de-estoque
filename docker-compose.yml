version: "3.9"

services:
  # =============================================
  # Flask API + Frontend (serves both)
  # =============================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockos-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-stockos-prod-secret-change-me}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-stockos-jwt-secret-change-me}
      - DATABASE_URL=sqlite:////data/stock.db
    volumes:
      - stock_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/dashboard/summary"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - stockos-net

  # =============================================
  # Nginx reverse proxy (optional production use)
  # =============================================
  nginx:
    image: nginx:alpine
    container_name: stockos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - stockos-net
    profiles:
      - production

volumes:
  stock_data:
    name: stockos_sqlite_data

networks:
  stockos-net:
    name: stockos-network
    driver: bridge
